version: "2"
run:
  build-tags:
    - netgo
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - dupl
    - gochecknoglobals
    - gochecknoinits
    - gocyclo
  settings:
    dupl:
      threshold: 100
    gocyclo:
      min-complexity: 10
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - gochecknoglobals
          - gochecknoinits
          - gocyclo
        path: _test\.go
      - linters:
          - dupl
          - gochecknoglobals
          - gochecknoinits
          - gocyclo
        path: cmd/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  new: true
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
